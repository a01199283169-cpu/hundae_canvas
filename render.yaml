# Render.com — FastAPI + Supabase Postgres
services:
  - type: web
    name: hundae-canvas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONING_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MONING_UPLOAD_DIR
        value: /data/uploads
    disk:
      name: hundae-data
      mountPath: /data
      sizeGB: 1
