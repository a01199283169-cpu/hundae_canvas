<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}출력{% endblock %} - 현대캔버스</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="print-page">
  <div class="print-toolbar no-print">
    <button type="button" class="btn btn-primary" onclick="window.print()">🖨 인쇄 (Ctrl+P)</button>
    <button type="button" class="btn btn-secondary" onclick="window.close()">닫기</button>
    <a href="javascript:history.back()" class="btn btn-secondary">← 돌아가기</a>
  </div>
  <header class="print-header">
    <div class="print-brand">
      <img src="/static/logo.jpg" alt="현대캔버스" class="print-logo">
      <div>
        <h1>{% block doc_title %}문서{% endblock %}</h1>
        <p class="print-meta">{% block print_meta %}{% endblock %} · 출력일시 {{ generated_at }}</p>
      </div>
    </div>
  </header>
  <main class="print-body">
    {% block print_content %}{% endblock %}
  </main>
  <footer class="print-footer">
    <span>현대캔버스(모닝프레임) 주문관리</span>
  </footer>
</body>
</html>
